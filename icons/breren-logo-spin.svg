<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Castro — a hillfort in plan (brigā: fortified, elevated settlement).
       Loading indicator: the three ramparts (the concentric rings)
       rotate in place about the center like nested gears; the outer
       huts orbit the center hut as a cluster (a plain circle can't show
       self-rotation, so orbiting is what makes their motion read).
       Polish: a soft drop shadow for depth, a subtle light-catching
       gradient along each rampart, and a gentle scale/fade entrance
       before the loop settles in. Same geometry as the static logo. -->
  <defs>
    <linearGradient id="g-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3d3936"/>
      <stop offset="50%" stop-color="#221f1d"/>
      <stop offset="100%" stop-color="#3d3936"/>
    </linearGradient>
    <linearGradient id="g-middle" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#56504c"/>
      <stop offset="50%" stop-color="#38332f"/>
      <stop offset="100%" stop-color="#56504c"/>
    </linearGradient>
    <linearGradient id="g-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#726b65"/>
      <stop offset="50%" stop-color="#4c4642"/>
      <stop offset="100%" stop-color="#726b65"/>
    </linearGradient>
    <linearGradient id="g-outer-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#c9c0b2"/>
      <stop offset="50%" stop-color="#a89e8e"/>
      <stop offset="100%" stop-color="#c9c0b2"/>
    </linearGradient>
    <linearGradient id="g-middle-dark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#bcb2a4"/>
      <stop offset="50%" stop-color="#968c7c"/>
      <stop offset="100%" stop-color="#bcb2a4"/>
    </linearGradient>
    <linearGradient id="g-inner-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#a99f8f"/>
      <stop offset="50%" stop-color="#847a6a"/>
      <stop offset="100%" stop-color="#a99f8f"/>
    </linearGradient>
    <filter id="depth" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <style>
    .outer  { stroke: url(#g-outer); }
    .middle { stroke: url(#g-middle); }
    .inner  { stroke: url(#g-inner); }
    .hut    { fill: #6b4423; }
    @media (prefers-color-scheme: dark) {
      .outer  { stroke: url(#g-outer-dark); }
      .middle { stroke: url(#g-middle-dark); }
      .inner  { stroke: url(#g-inner-dark); }
      .hut    { fill: #c9944f; }
    }

    .enter {
      transform-box: view-box;
      transform-origin: 256px 256px;
      animation: enter 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes enter {
      0%   { opacity: 0; transform: scale(0.82); }
      100% { opacity: 1; transform: scale(1); }
    }

    .outer, .middle, .inner, .huts {
      transform-box: view-box;
      transform-origin: 256px 256px;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-delay: 0.6s;
      animation-fill-mode: backwards;
    }
    .outer  { animation-name: spin-cw;  animation-duration: 16s; }
    .middle { animation-name: spin-ccw; animation-duration: 8s; }
    .inner  { animation-name: spin-cw;  animation-duration: 4s; }
    .huts   { animation-name: spin-ccw; animation-duration: 8s; }
    @keyframes spin-cw  { to { transform: rotate(360deg); } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .enter { animation: none; }
      .outer, .middle, .inner, .huts { animation: none; }
    }
  </style>

  <g class="enter" filter="url(#depth)">
    <!-- Outer rampart, irregular contour, broken by a gate -->
    <path class="outer" fill="none" stroke-width="32" stroke-linecap="round"
          d="M 191.0 68.5 Q 256.0 59.9 321.7 67.6 Q 387.3 75.2 412.8 136.1
             Q 438.2 196.8 449.0 259.5 Q 459.8 322.2 417.5 371.3
             Q 375.2 420.2 315.6 452.1 Q 256.0 484.0 200.4 446.5
             Q 144.7 409.1 97.4 366.0 Q 50.0 322.9 55.5 257.7
             Q 60.8 192.6 93.4 134.8"/>

    <!-- Middle rampart, irregular contour, closed -->
    <path class="middle" fill="none" stroke-width="26"
          d="M 212.5 128.8 Q 256.0 121.5 300.2 127.9 Q 344.5 134.2 361.0 175.4
             Q 377.4 216.6 386.1 258.9 Q 394.7 301.1 365.6 333.9
             Q 336.4 366.7 296.2 387.7 Q 256.0 408.8 219.2 383.1
             Q 182.2 357.5 150.9 329.0 Q 119.4 300.3 124.8 257.7
             Q 130.3 215.2 149.5 175.6 Q 168.9 136.1 212.5 128.8 Z"/>

    <!-- Inner rampart, irregular contour, closed -->
    <path class="inner" fill="none" stroke-width="19"
          d="M 225.3 185.4 Q 256.0 176.2 288.3 183.8 Q 320.5 191.5 325.9 223.7
             Q 331.2 256.0 325.1 287.5 Q 318.9 318.9 287.5 328.5
             Q 256.0 338.1 222.9 330.1 Q 189.9 322.1 186.5 289.1
             Q 183.0 256.0 188.9 225.3 Q 194.8 194.8 225.3 185.4 Z"/>

    <!-- Hut foundations, timber-and-thatch (bher— what the fort carries and protects).
         Outer huts orbit as a cluster; the center hut sits on the axis
         and stays put. -->
    <g class="huts">
      <circle class="hut" cx="256.0" cy="216.7" r="15.6"/>
      <circle class="hut" cx="291.5" cy="244.4" r="12.0"/>
      <circle class="hut" cx="280.2" cy="289.3" r="13.2"/>
      <circle class="hut" cx="235.2" cy="284.7" r="10.8"/>
      <circle class="hut" cx="215.2" cy="242.7" r="14.4"/>
    </g>
    <circle class="hut" cx="256.0" cy="256.0" r="18.0"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#9d8df5"/>
      <stop offset="55%" stop-color="#6d59f0"/>
      <stop offset="100%" stop-color="#3b2fa0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Ambient glow behind ball -->
  <ellipse cx="256" cy="270" rx="145" ry="130" fill="#6d59f0" opacity="0.18" filter="url(#softGlow)"/>

  <!-- Main ball -->
  <circle cx="256" cy="252" r="148" fill="url(#ballGrad)" filter="url(#glow)"/>

  <!-- Ball border -->
  <circle cx="256" cy="252" r="148" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.55"/>

  <!-- Shine highlight -->
  <ellipse cx="216" cy="192" rx="52" ry="34" fill="white" opacity="0.14" transform="rotate(-20 216 192)"/>
  <ellipse cx="208" cy="185" rx="22" ry="14" fill="white" opacity="0.22" transform="rotate(-20 208 185)"/>

  <!-- Number "?" on ball — Tyche is chance/fortune -->
  <text x="256" y="295"
        font-family="Courier New, monospace"
        font-size="148"
        font-weight="700"
        text-anchor="middle"
        fill="white"
        opacity="0.92">?</text>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="252" rx="192" ry="54" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.35" transform="rotate(-25 256 252)"/>
  <ellipse cx="256" cy="252" rx="192" ry="54" fill="none" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="12 8" opacity="0.25" transform="rotate(-25 256 252)"/>

  <!-- Small sparkle dots -->
  <circle cx="128" cy="148" r="5" fill="#facc15" opacity="0.8"/>
  <circle cx="390" cy="120" r="4" fill="#38bdf8" opacity="0.7"/>
  <circle cx="420" cy="355" r="6" fill="#e879f9" opacity="0.65"/>
  <circle cx="96"  cy="370" r="4" fill="#34d399" opacity="0.7"/>
  <circle cx="165" cy="440" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="345" cy="448" r="3.5" fill="#fb923c" opacity="0.65"/>
</svg>

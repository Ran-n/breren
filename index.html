<!doctype html>
<html lang="gl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breren</title>
<link rel="icon" type="image/svg+xml" href="icons/breren-logo.svg">
<style>
  /* Gruvbox palette: https://github.com/morhetz/gruvbox */
  :root {
    color-scheme: light dark;
  }
  :root, :root[data-theme="light"] {
    --bg: #fbf1c7;        /* gruvbox light bg0 */
    --bg-alt: #f2e5bc;    /* gruvbox light bg0_s */
    --fg: #3c3836;        /* gruvbox light fg1 */
    --fg-muted: #7c6f64;  /* gruvbox light fg4 */
    --card-bg: #ebdbb2;   /* gruvbox light bg1 */
    --card-border: #d5c4a1; /* gruvbox light bg2 */
    --accent: #d65d0e;    /* gruvbox light orange */
    --shadow: rgba(60, 45, 20, 0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #282828;        /* gruvbox dark bg0 */
      --bg-alt: #1d2021;    /* gruvbox dark bg0_h */
      --fg: #ebdbb2;        /* gruvbox dark fg1 */
      --fg-muted: #a89984;  /* gruvbox dark fg4 */
      --card-bg: #3c3836;   /* gruvbox dark bg1 */
      --card-border: #504945; /* gruvbox dark bg2 */
      --accent: #fe8019;    /* gruvbox dark bright orange */
      --shadow: rgba(0, 0, 0, 0.45);
    }
  }
  :root[data-theme="dark"] {
    --bg: #282828; --bg-alt: #1d2021; --fg: #ebdbb2; --fg-muted: #a89984;
    --card-bg: #3c3836; --card-border: #504945; --accent: #fe8019;
    --shadow: rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 4rem 1.5rem 5rem;
    position: relative;
  }
  .toolbar {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* Language picker */
  .lang-picker {
    position: relative;
  }
  .lang-trigger {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font: inherit;
    cursor: pointer;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--fg);
    padding: 0.4rem 0.6rem;
    font-size: 0.82rem;
    font-weight: 600;
  }
  .lang-trigger:hover { border-color: var(--accent); }
  .lang-trigger .chevron {
    color: var(--fg-muted);
    font-size: 0.7rem;
  }
  .lang-menu {
    position: absolute;
    top: calc(100% + 0.4rem);
    right: 0;
    margin: 0;
    padding: 0.35rem;
    list-style: none;
    width: 15rem;
    max-height: 20rem;
    overflow-y: auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    box-shadow: 0 8px 24px var(--shadow);
    z-index: 20;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    width: 100%;
    font: inherit;
    text-align: left;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--fg);
    padding: 0.45rem 0.55rem;
    font-size: 0.86rem;
  }
  .lang-option:hover,
  .lang-option:focus-visible {
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    outline: none;
  }
  .lang-option[aria-selected="true"] {
    font-weight: 700;
    color: var(--accent);
  }
  .flag {
    flex: none;
    display: inline-flex;
    width: 1.3rem;
    height: 1.3rem;
    line-height: 1.3rem;
    font-size: 1.1rem;
  }
  .flag svg { width: 100%; height: 100%; border-radius: 2px; }

  .theme-btn {
    font: inherit;
    cursor: pointer;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--fg-muted);
    width: 2.1rem;
    height: 2.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .theme-btn:hover { border-color: var(--accent); }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  .mark {
    display: block;
    width: 72px;
    height: 72px;
    margin: 0 auto 0.5rem;
    cursor: pointer;
  }
  .mark svg { display: block; width: 100%; height: 100%; }
  .mark:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 0.4rem;
    font-weight: 700;
  }
  .tagline {
    color: var(--fg-muted);
    font-size: 1rem;
    margin: 0;
  }
  .category {
    margin-bottom: 2.5rem;
  }
  .category h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    margin: 0 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--card-border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  a.tile {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 1.1rem;
    border-radius: 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
  }
  a.tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--shadow);
    border-color: var(--accent);
  }
  .tile-icon {
    flex: none;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    background: color-mix(in srgb, var(--tile-color, var(--accent)) 25%, transparent);
    overflow: hidden;
  }
  .tile-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .tile-text {
    min-width: 0;
  }
  .tile-name {
    font-weight: 600;
    font-size: 0.98rem;
    margin: 0 0 0.15rem;
    overflow-wrap: break-word;
  }
  .tile-desc {
    font-size: 0.82rem;
    color: var(--fg-muted);
    margin: 0;
    line-height: 1.35;
  }
  .empty, .error {
    text-align: center;
    color: var(--fg-muted);
    padding: 2rem 0;
  }
</style>
</head>
<body>
<main>
  <div class="toolbar">
    <div class="lang-picker">
      <button class="lang-trigger" id="lang-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="flag" id="lang-trigger-flag"></span>
        <span id="lang-trigger-name"></span>
        <span class="chevron">▾</span>
      </button>
      <ul class="lang-menu" id="lang-menu" role="listbox" hidden></ul>
    </div>
    <button class="theme-btn" id="theme-toggle" type="button"></button>
  </div>
  <header>
    <div class="mark" id="logo-mark" role="button" tabindex="0" aria-label="Redraw logo" aria-disabled="false"></div>
    <h1 id="page-title">Breren</h1>
    <p class="tagline" id="page-tagline"></p>
  </header>
  <div id="content"></div>
</main>

    },

      empty: 'এখনো কোনো লিঙ্ক নেই — {file}-এ কিছু যোগ করুন।',
      errorPrefix: '{file} লোড করা যায়নি',
      themeToLight: 'লাইট মোডে যান',

    },
    ur: {
      tagline: 'ایک بنیاد جو اہم چیزوں کو آگے لے کر جاتی ہے۔',
      empty: 'ابھی تک کوئی لنک نہیں — {file} میں کچھ شامل کریں۔',

      tagline: 'بنیادی که آنچه اهمیت دارد را به پیش می‌برد.',
      empty: 'هنوز پیوندی وجود ندارد — چند مورد به {file} اضافه کنید.',
      errorPrefix: 'بارگذاری {file} ممکن نشد',

    tr: {

      empty: 'Henüz bağlantı yok — {file} dosyasına birkaç tane ekleyin.',
      errorPrefix: '{file} yüklenemedi',
      themeToLight: 'Aydınlık moda geç',

    },
    vi: {
      tagline: 'Một nền tảng mang những điều quan trọng tiến về phía trước.',
      empty: 'Chưa có liên kết nào — hãy thêm vào {file}.',
      errorPrefix: 'Không thể tải {file}',
      themeToLight: 'Chuyển sang chế độ sáng',
      themeToDark: 'Chuyển sang chế độ tối'
    },
    id: {
      tagline: 'Fondasi yang membawa hal-hal penting maju ke depan.',
      empty: 'Belum ada tautan — tambahkan beberapa di {file}.',
      errorPrefix: 'Tidak dapat memuat {file}',
      themeToLight: 'Beralih ke mode terang',
      themeToDark: 'Beralih ke mode gelap'
    },
    th: {
      tagline: 'รากฐานที่นำสิ่งสำคัญไปข้างหน้า',
      empty: 'ยังไม่มีลิงก์ — เพิ่มลงใน {file}',
      errorPrefix: 'โหลด {file} ไม่สำเร็จ',
      themeToLight: 'สลับเป็นโหมดสว่าง',
      themeToDark: 'สลับเป็นโหมดมืด'
    },
    sw: {
      tagline: 'Msingi unaobeba mbele mambo muhimu.',
      empty: 'Bado hakuna viungo — ongeza baadhi kwenye {file}.',
      errorPrefix: 'Imeshindwa kupakia {file}',
      themeToLight: 'Badilisha hali ya mwanga',
      themeToDark: 'Badilisha hali ya giza'
    },
    te: {
      tagline: 'ముఖ్యమైన వాటిని ముందుకు తీసుకెళ్లే పునాది.',
      empty: 'ఇంకా లింక్‌లు లేవు — {file}కు కొన్ని జోడించండి.',
      errorPrefix: '{file}ను లోడ్ చేయలేకపోయాము',
      themeToLight: 'లైట్ మోడ్‌కు మారండి',
      themeToDark: 'డార్క్ మోడ్‌కు మారండి'
    },
    ta: {
      tagline: 'முக்கியமானதை முன்னோக்கி கொண்டு செல்லும் அடித்தளம்.',
      empty: 'இதுவரை இணைப்புகள் இல்லை — {file} இல் சிலவற்றைச் சேர்க்கவும்.',
      errorPrefix: '{file} ஐ ஏற்ற முடியவில்லை',
      themeToLight: 'லைட் பயன்முறைக்கு மாறவும்',
      themeToDark: 'டார்க் பயன்முறைக்கு மாறவும்'
    },
    pa: {
      tagline: 'ਇੱਕ ਬੁਨਿਆਦ ਜੋ ਜ਼ਰੂਰੀ ਚੀਜ਼ਾਂ ਨੂੰ ਅੱਗੇ ਲੈ ਜਾਂਦੀ ਹੈ।',
      empty: 'ਹਾਲੇ ਕੋਈ ਲਿੰਕ ਨਹੀਂ — {file} ਵਿੱਚ ਕੁਝ ਸ਼ਾਮਲ ਕਰੋ।',
      errorPrefix: '{file} ਲੋਡ ਨਹੀਂ ਹੋ ਸਕੀ',
      themeToLight: "ਲਾਈਟ ਮੋਡ 'ਤੇ ਜਾਓ",
      themeToDark: "ਡਾਰਕ ਮੋਡ 'ਤੇ ਜਾਓ"
    }
  };
  var RTL_LANGS = ['ar', 'ur', 'fa'];

  var currentLang = detectLang();
  var latestData = null;
  var latestError = null;
  var translations = {};

  setupLangPicker();
  setupThemeToggle();
  setupLogoMark();
  applyTheme(effectiveTheme());
  applyDirection(currentLang);
  applyTexts();

  fetchTOML(TRANSLATIONS_FILE)
    .then(function (data) { translations = data; if (latestData) render(latestData); })
    .catch(function () { translations = {}; }); // optional file; missing/broken -> no translations

  fetchTOML(LINKS_FILE)
    .then(function (data) { latestData = data; render(data); })
    .catch(function (err) {
      latestError = err;
      renderError(err);
    });

  function fetchTOML(file) {
    return fetch(file, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error(file + ' responded with ' + r.status);
        return r.text();
      })
      .then(parseTOML);
  }

  // ---- i18n ----------------------------------------------------------

  function detectLang() {
    var stored = localStorage.getItem('breren-lang');
    if (stored && SUPPORTED_LANGS.indexOf(stored) !== -1) return stored;
    var candidates = navigator.languages || [navigator.language || 'gl'];
    for (var i = 0; i < candidates.length; i++) {
      var code = (candidates[i] || '').slice(0, 2).toLowerCase();
      if (SUPPORTED_LANGS.indexOf(code) !== -1) return code;
    }
    return 'gl';
  }

  function t(key, vars) {
    var dict = STRINGS[currentLang] || STRINGS.gl;
    var str = dict[key] || STRINGS.gl[key] || key;
    if (vars) {
      Object.keys(vars).forEach(function (k) {
        str = str.replace('{' + k + '}', vars[k]);
      });
    }
    return str;
  }

  // Looks up `<base>_<currentLang>` (e.g. `name_es`) for a links.toml
  // category/item, in this priority order: translations.toml's table for
  // this object's `id`, then an inline `<base>_<code>` field on the
  // object itself (kept as an escape hatch), then the plain `<base>`
  // field untranslated. Translations are written by hand — ask to have a
  // new tile translated when you add it; there's no runtime translation.
  function localized(obj, base) {
    var key = base + '_' + currentLang;
    var fromFile = obj.id && translations[obj.id];
    if (fromFile && fromFile[key]) return fromFile[key];
    return obj[key] || obj[base];
  }

  function setupLangPicker() {
    var trigger = document.getElementById('lang-trigger');
    var menu = document.getElementById('lang-menu');
    var triggerFlag = document.getElementById('lang-trigger-flag');
    var triggerName = document.getElementById('lang-trigger-name');

    LANGUAGES.forEach(function (lang) {
      var li = document.createElement('li');
      li.setAttribute('role', 'presentation');

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'lang-option';
      btn.setAttribute('role', 'option');
      btn.setAttribute('aria-selected', String(lang.code === currentLang));
      btn.innerHTML =
        '<span class="flag">' + lang.flag + '</span><span>' + lang.name + '</span>';
      btn.addEventListener('click', function () {
        selectLang(lang.code);
        closeMenu();
      });

      li.appendChild(btn);
      menu.appendChild(li);
    });

    updateTrigger();

    trigger.addEventListener('click', function () {
      var isOpen = !menu.hidden;
      if (isOpen) closeMenu(); else openMenu();
    });

    document.addEventListener('click', function (e) {
      if (!menu.hidden && !e.target.closest('.lang-picker')) closeMenu();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !menu.hidden) {
        closeMenu();
        trigger.focus();
      }
    });

    function openMenu() {
      menu.hidden = false;
      trigger.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      menu.hidden = true;
      trigger.setAttribute('aria-expanded', 'false');
    }
    function updateTrigger() {
      var lang = LANG_BY_CODE[currentLang];
      triggerFlag.innerHTML = lang.flag;
      triggerName.textContent = lang.name;
      Array.prototype.forEach.call(menu.querySelectorAll('.lang-option'), function (btn, i) {
        btn.setAttribute('aria-selected', String(LANGUAGES[i].code === currentLang));
      });
    }

    // exposed for selectLang()
    setupLangPicker._updateTrigger = updateTrigger;
  }

  function selectLang(code) {
    currentLang = code;
    localStorage.setItem('breren-lang', code);
    document.documentElement.lang = code;
    applyDirection(code);
    setupLangPicker._updateTrigger();
    applyTexts();
  }

  function applyDirection(code) {
    var lang = LANG_BY_CODE[code];
    document.documentElement.dir = lang && lang.rtl ? 'rtl' : 'ltr';
  }

  function applyTexts() {
    document.getElementById('page-tagline').textContent = t('tagline');
    updateThemeButtonLabel();
    if (latestData) render(latestData);
    else if (latestError) renderError(latestError);
  }

  // ---- theme ----------------------------------------------------------

  function effectiveTheme() {
    var stored = localStorage.getItem('breren-theme');
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle');
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    updateThemeButtonLabel();
  }

  function updateThemeButtonLabel() {
    var theme = document.documentElement.getAttribute('data-theme');
    var btn = document.getElementById('theme-toggle');
    btn.setAttribute('aria-label', theme === 'dark' ? t('themeToLight') : t('themeToDark'));
    btn.title = btn.getAttribute('aria-label');
  }

  function setupThemeToggle() {
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var next = effectiveTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem('breren-theme', next);
      applyTheme(next);
    });
  }

  // ---- logo mark ----------------------------------------------------

  function setupLogoMark() {
    var mark = document.getElementById('logo-mark');
    var busy = false;

    fetch('icons/breren-logo-animated.svg', { cache: 'no-store' })
      .then(function (r) { return r.text(); })
      .then(function (svgText) {
        mark.innerHTML = svgText;
        mark.addEventListener('click', replay);
        mark.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            replay();
          }
        });
      })
      .catch(function () {}); // decorative; page works without it

    function replay() {
      if (busy) return;
      var animated = mark.querySelectorAll('.rampart, .hut');
      if (animated.length === 0) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      busy = true;
      mark.setAttribute('aria-disabled', 'true');
      var remaining = animated.length;

      Array.prototype.forEach.call(animated, function (el) { el.style.animation = 'none'; });
      void mark.offsetWidth; // force reflow so the animation restarts
      Array.prototype.forEach.call(animated, function (el) {
        el.style.animation = '';
        el.addEventListener('animationend', onEnd);
      });

      function onEnd(e) {
        e.currentTarget.removeEventListener('animationend', onEnd);
        remaining--;
        if (remaining === 0) {
          busy = false;
          mark.setAttribute('aria-disabled', 'false');
        }
      }
    }
  }

  // ---- TOML parsing ----------------------------------------------------

  // Minimal TOML subset parser: top-level string/bool/number keys, plus
  // [[array.of.tables]] headers nested the way TOML actually nests them
  // (a new [[a.b]] entry attaches under the most recently created [[a]]).
  // Good enough for this page's schema; not a general TOML implementation.
  function parseTOML(text) {
    var root = {};
    var current = root;
    var lines = text.split(/\r?\n/);

    lines.forEach(function (raw) {
      var line = raw.trim();
      if (!line || line.charAt(0) === '#') return;

      var arrayHeader = line.match(/^\[\[(.+)\]\]$/);
      if (arrayHeader) {
        current = descend(root, arrayHeader[1].split('.'), true);
        return;
      }

      var tableHeader = line.match(/^\[(.+)\]$/);
      if (tableHeader) {
        current = descend(root, tableHeader[1].split('.'), false);
        return;
      }

      var eq = line.indexOf('=');
      if (eq === -1) return;
      var key = line.slice(0, eq).trim();
      current[key] = parseValue(line.slice(eq + 1));
    });

    return root;

    function descend(container, path, isArrayLeaf) {
      for (var i = 0; i < path.length - 1; i++) {
        var key = path[i].trim();
        if (!container[key]) container[key] = [];
        var arr = container[key];
        if (arr.length === 0) arr.push({});
        container = arr[arr.length - 1];
      }
      var lastKey = path[path.length - 1].trim();
      if (isArrayLeaf) {
        if (!container[lastKey]) container[lastKey] = [];
        var table = {};
        container[lastKey].push(table);
        return table;
      }
      if (!container[lastKey]) container[lastKey] = {};
      return container[lastKey];
    }

    function parseValue(raw) {
      var v = raw.trim();
      if (v.charAt(0) === '"') {
        var out = '';
        for (var i = 1; i < v.length; i++) {
          if (v.charAt(i) === '\\') { out += v.charAt(i + 1); i++; continue; }
          if (v.charAt(i) === '"') break;
          out += v.charAt(i);
        }
        return out;
      }
      var hashIdx = v.indexOf('#');
      if (hashIdx !== -1) v = v.slice(0, hashIdx).trim();
      if (v === 'true') return true;
      if (v === 'false') return false;
      if (v !== '' && !isNaN(Number(v))) return Number(v);
      return v;
    }
  }

  // ---- rendering ----------------------------------------------------

  function render(data) {
    if (data.title) document.getElementById('page-title').textContent = data.title;
    document.title = data.title || 'Breren';

    var container = document.getElementById('content');
    container.innerHTML = '';
    var categories = Array.isArray(data.categories) ? data.categories : [];

    if (categories.length === 0) {
      container.innerHTML = '<p class="empty">' + escapeHtml(t('empty', { file: LINKS_FILE })) + '</p>';
      return;
    }

    categories.forEach(function (cat) {
      var section = document.createElement('section');
      section.className = 'category';

      var catName = localized(cat, 'name');
      if (catName) {
        var h2 = document.createElement('h2');
        h2.textContent = catName;
        section.appendChild(h2);
      }

      var grid = document.createElement('div');
      grid.className = 'grid';

      (cat.items || []).forEach(function (item) {
        grid.appendChild(renderTile(item));
      });

      section.appendChild(grid);
      container.appendChild(section);
    });
  }

  function renderError(err) {
    document.getElementById('content').innerHTML =
      '<p class="error">' + escapeHtml(t('errorPrefix', { file: LINKS_FILE })) +
      ' (' + escapeHtml(err.message) + ').</p>';
  }

  function renderTile(item) {
    var a = document.createElement('a');
    a.className = 'tile';
    a.href = item.url || '#';
    if (item.url && /^https?:\/\//i.test(item.url)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
    if (item.color) a.style.setProperty('--tile-color', item.color);

    var itemName = localized(item, 'name');
    var itemDesc = localized(item, 'description');

    var icon = document.createElement('div');
    icon.className = 'tile-icon';
    if (item.icon && /\.(svg|png|jpe?g|webp|gif)$/i.test(item.icon)) {
      var img = document.createElement('img');
      img.src = item.icon;
      img.alt = '';
      icon.appendChild(img);
    } else {
      icon.textContent = item.icon || (itemName ? itemName.charAt(0).toUpperCase() : '?');
    }

    var text = document.createElement('div');
    text.className = 'tile-text';

    var name = document.createElement('p');
    name.className = 'tile-name';
    name.textContent = itemName || item.url || 'Untitled';
    text.appendChild(name);

    if (itemDesc) {
      var desc = document.createElement('p');
      desc.className = 'tile-desc';
      desc.textContent = itemDesc;
      text.appendChild(desc);
    }

    a.appendChild(icon);
    a.appendChild(text);
    return a;
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
})();
</script>

<!doctype html>
<html lang="gl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breren</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9B%B0%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  /* Gruvbox palette: https://github.com/morhetz/gruvbox */
  :root {
    color-scheme: light dark;
  }
  :root, :root[data-theme="light"] {
    --bg: #fbf1c7;        /* gruvbox light bg0 */
    --bg-alt: #f2e5bc;    /* gruvbox light bg0_s */
    --fg: #3c3836;        /* gruvbox light fg1 */
    --fg-muted: #7c6f64;  /* gruvbox light fg4 */
    --card-bg: #ebdbb2;   /* gruvbox light bg1 */
    --card-border: #d5c4a1; /* gruvbox light bg2 */
    --accent: #d65d0e;    /* gruvbox light orange */
    --shadow: rgba(60, 45, 20, 0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #282828;        /* gruvbox dark bg0 */
      --bg-alt: #1d2021;    /* gruvbox dark bg0_h */
      --fg: #ebdbb2;        /* gruvbox dark fg1 */
      --fg-muted: #a89984;  /* gruvbox dark fg4 */
      --card-bg: #3c3836;   /* gruvbox dark bg1 */
      --card-border: #504945; /* gruvbox dark bg2 */
      --accent: #fe8019;    /* gruvbox dark bright orange */
      --shadow: rgba(0, 0, 0, 0.45);
    }
  }
  :root[data-theme="dark"] {
    --bg: #282828; --bg-alt: #1d2021; --fg: #ebdbb2; --fg-muted: #a89984;
    --card-bg: #3c3836; --card-border: #504945; --accent: #fe8019;
    --shadow: rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 4rem 1.5rem 5rem;
    position: relative;
  }
  .toolbar {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .lang-group {
    display: flex;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-btn, .theme-btn {
    font: inherit;
    cursor: pointer;
    border: none;
    background: var(--card-bg);
    color: var(--fg-muted);
    padding: 0.4rem 0.6rem;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .lang-btn + .lang-btn { border-left: 1px solid var(--card-border); }
  .lang-btn[aria-pressed="true"] {
    background: var(--accent);
    color: var(--bg);
  }
  .theme-btn {
    border: 1px solid var(--card-border);
    border-radius: 8px;
    width: 2.1rem;
    height: 2.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .lang-btn:hover, .theme-btn:hover { border-color: var(--accent); }
  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  .mark {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 0.5rem;
    filter: saturate(0.7);
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 0.4rem;
    font-weight: 700;
  }
  .tagline {
    color: var(--fg-muted);
    font-size: 1rem;
    margin: 0;
  }
  .category {
    margin-bottom: 2.5rem;
  }
  .category h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    margin: 0 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--card-border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  a.tile {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 1.1rem;
    border-radius: 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
  }
  a.tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--shadow);
    border-color: var(--accent);
  }
  .tile-icon {
    flex: none;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    background: color-mix(in srgb, var(--tile-color, var(--accent)) 25%, transparent);
  }
  .tile-text {
    min-width: 0;
  }
  .tile-name {
    font-weight: 600;
    font-size: 0.98rem;
    margin: 0 0 0.15rem;
    overflow-wrap: break-word;
  }
  .tile-desc {
    font-size: 0.82rem;
    color: var(--fg-muted);
    margin: 0;
    line-height: 1.35;
  }
  .empty, .error {
    text-align: center;
    color: var(--fg-muted);
    padding: 2rem 0;
  }
  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.78rem;
    color: var(--fg-muted);
  }
  footer a { color: inherit; }
</style>
</head>
<body>
<main>
  <div class="toolbar">
    <div class="lang-group" id="lang-group" role="group"></div>
    <button class="theme-btn" id="theme-toggle" type="button"></button>
  </div>
  <header>
    <span class="mark">⛰️</span>
    <h1 id="page-title">Breren</h1>
    <p class="tagline" id="page-tagline"></p>
  </header>
  <div id="content"></div>
  <footer id="page-footer"></footer>
</main>
<script>
(function () {
  var LINKS_FILE = 'links.toml';
  var SUPPORTED_LANGS = ['gl', 'en', 'eo'];
  var LANG_LABELS = { gl: 'GL', en: 'EN', eo: 'EO' };

  var STRINGS = {
    gl: {
      tagline: 'Un alicerce que leva adiante o que importa.',
      footer: 'Edita {file} para cambiar estas ligazóns — non hai que tocar ningún outro ficheiro.',
      empty: 'Aínda non hai ligazóns — engade algunhas a {file}.',
      errorPrefix: 'Non se puido cargar {file}',
      themeToLight: 'Cambiar a modo claro',
      themeToDark: 'Cambiar a modo escuro'
    },
    en: {
      tagline: 'A foundation that carries what matters forward.',
      footer: 'Edit {file} to change these tiles — no other file needs to change.',
      empty: 'No links yet — add some to {file}.',
      errorPrefix: 'Could not load {file}',
      themeToLight: 'Switch to light mode',
      themeToDark: 'Switch to dark mode'
    },
    eo: {
      tagline: 'Fundamento kiu portas antaŭen tion, kio gravas.',
      footer: 'Redaktu {file} por ŝanĝi ĉi tiujn kahelojn — neniu alia dosiero devas ŝanĝiĝi.',
      empty: 'Ankoraŭ neniuj ligiloj — aldonu kelkajn al {file}.',
      errorPrefix: 'Ne eblis ŝargi {file}',
      themeToLight: 'Ŝanĝi al luma reĝimo',
      themeToDark: 'Ŝanĝi al malluma reĝimo'
    }
  };

  var currentLang = detectLang();
  var latestData = null;
  var latestError = null;

  setupLangSwitcher();
  setupThemeToggle();
  applyTheme(effectiveTheme());
  applyTexts();

  fetch(LINKS_FILE, { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error(LINKS_FILE + ' responded with ' + r.status);
      return r.text();
    })
    .then(parseTOML)
    .then(function (data) { latestData = data; render(data); })
    .catch(function (err) {
      latestError = err;
      renderError(err);
    });

  // ---- i18n ----------------------------------------------------------

  function detectLang() {
    var stored = localStorage.getItem('breren-lang');
    if (stored && SUPPORTED_LANGS.indexOf(stored) !== -1) return stored;
    var candidates = navigator.languages || [navigator.language || 'gl'];
    for (var i = 0; i < candidates.length; i++) {
      var code = (candidates[i] || '').slice(0, 2).toLowerCase();
      if (SUPPORTED_LANGS.indexOf(code) !== -1) return code;
    }
    return 'gl';
  }

  function t(key, vars) {
    var dict = STRINGS[currentLang] || STRINGS.gl;
    var str = dict[key] || STRINGS.gl[key] || key;
    if (vars) {
      Object.keys(vars).forEach(function (k) {
        str = str.replace('{' + k + '}', vars[k]);
      });
    }
    return str;
  }

  function setupLangSwitcher() {
    var group = document.getElementById('lang-group');
    SUPPORTED_LANGS.forEach(function (code) {
      var btn = document.createElement('button');
      btn.className = 'lang-btn';
      btn.type = 'button';
      btn.textContent = LANG_LABELS[code];
      btn.setAttribute('aria-pressed', String(code === currentLang));
      btn.addEventListener('click', function () {
        currentLang = code;
        localStorage.setItem('breren-lang', code);
        document.documentElement.lang = code;
        Array.prototype.forEach.call(group.children, function (b) {
          b.setAttribute('aria-pressed', String(b.textContent === LANG_LABELS[code]));
        });
        applyTexts();
      });
      group.appendChild(btn);
    });
    document.documentElement.lang = currentLang;
  }

  function applyTexts() {
    document.getElementById('page-tagline').textContent = t('tagline');
    document.getElementById('page-footer').innerHTML =
      t('footer', { file: '<a href="' + LINKS_FILE + '">' + LINKS_FILE + '</a>' });
    updateThemeButtonLabel();
    if (latestData) render(latestData);
    else if (latestError) renderError(latestError);
  }

  // ---- theme ----------------------------------------------------------

  function effectiveTheme() {
    var stored = localStorage.getItem('breren-theme');
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle');
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    updateThemeButtonLabel();
  }

  function updateThemeButtonLabel() {
    var theme = document.documentElement.getAttribute('data-theme');
    var btn = document.getElementById('theme-toggle');
    btn.setAttribute('aria-label', theme === 'dark' ? t('themeToLight') : t('themeToDark'));
    btn.title = btn.getAttribute('aria-label');
  }

  function setupThemeToggle() {
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var next = effectiveTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem('breren-theme', next);
      applyTheme(next);
    });
  }

  // ---- TOML parsing ----------------------------------------------------

  // Minimal TOML subset parser: top-level string/bool/number keys, plus
  // [[array.of.tables]] headers nested the way TOML actually nests them
  // (a new [[a.b]] entry attaches under the most recently created [[a]]).
  // Good enough for this page's schema; not a general TOML implementation.
  function parseTOML(text) {
    var root = {};
    var current = root;
    var lines = text.split(/\r?\n/);

    lines.forEach(function (raw) {
      var line = raw.trim();
      if (!line || line.charAt(0) === '#') return;

      var arrayHeader = line.match(/^\[\[(.+)\]\]$/);
      if (arrayHeader) {
        current = descend(root, arrayHeader[1].split('.'), true);
        return;
      }

      var tableHeader = line.match(/^\[(.+)\]$/);
      if (tableHeader) {
        current = descend(root, tableHeader[1].split('.'), false);
        return;
      }

      var eq = line.indexOf('=');
      if (eq === -1) return;
      var key = line.slice(0, eq).trim();
      current[key] = parseValue(line.slice(eq + 1));
    });

    return root;

    function descend(container, path, isArrayLeaf) {
      for (var i = 0; i < path.length - 1; i++) {
        var key = path[i].trim();
        if (!container[key]) container[key] = [];
        var arr = container[key];
        if (arr.length === 0) arr.push({});
        container = arr[arr.length - 1];
      }
      var lastKey = path[path.length - 1].trim();
      if (isArrayLeaf) {
        if (!container[lastKey]) container[lastKey] = [];
        var table = {};
        container[lastKey].push(table);
        return table;
      }
      if (!container[lastKey]) container[lastKey] = {};
      return container[lastKey];
    }

    function parseValue(raw) {
      var v = raw.trim();
      if (v.charAt(0) === '"') {
        var out = '';
        for (var i = 1; i < v.length; i++) {
          if (v.charAt(i) === '\\') { out += v.charAt(i + 1); i++; continue; }
          if (v.charAt(i) === '"') break;
          out += v.charAt(i);
        }
        return out;
      }
      var hashIdx = v.indexOf('#');
      if (hashIdx !== -1) v = v.slice(0, hashIdx).trim();
      if (v === 'true') return true;
      if (v === 'false') return false;
      if (v !== '' && !isNaN(Number(v))) return Number(v);
      return v;
    }
  }

  // ---- rendering ----------------------------------------------------

  function render(data) {
    if (data.title) document.getElementById('page-title').textContent = data.title;
    document.title = data.title || 'Breren';

    var container = document.getElementById('content');
    container.innerHTML = '';
    var categories = Array.isArray(data.categories) ? data.categories : [];

    if (categories.length === 0) {
      container.innerHTML = '<p class="empty">' + escapeHtml(t('empty', { file: LINKS_FILE })) + '</p>';
      return;
    }

    categories.forEach(function (cat) {
      var section = document.createElement('section');
      section.className = 'category';

      if (cat.name) {
        var h2 = document.createElement('h2');
        h2.textContent = cat.name;
        section.appendChild(h2);
      }

      var grid = document.createElement('div');
      grid.className = 'grid';

      (cat.items || []).forEach(function (item) {
        grid.appendChild(renderTile(item));
      });

      section.appendChild(grid);
      container.appendChild(section);
    });
  }

  function renderError(err) {
    document.getElementById('content').innerHTML =
      '<p class="error">' + escapeHtml(t('errorPrefix', { file: LINKS_FILE })) +
      ' (' + escapeHtml(err.message) + ').</p>';
  }

  function renderTile(item) {
    var a = document.createElement('a');
    a.className = 'tile';
    a.href = item.url || '#';
    if (item.url && /^https?:\/\//i.test(item.url)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
    if (item.color) a.style.setProperty('--tile-color', item.color);

    var icon = document.createElement('div');
    icon.className = 'tile-icon';
    icon.textContent = item.icon || (item.name ? item.name.charAt(0).toUpperCase() : '?');

    var text = document.createElement('div');
    text.className = 'tile-text';

    var name = document.createElement('p');
    name.className = 'tile-name';
    name.textContent = item.name || item.url || 'Untitled';
    text.appendChild(name);

    if (item.description) {
      var desc = document.createElement('p');
      desc.className = 'tile-desc';
      desc.textContent = item.description;
      text.appendChild(desc);
    }

    a.appendChild(icon);
    a.appendChild(text);
    return a;
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
})();
</script>
</body>
</html>

description_th = "ตัวเลือกเลขสุ่มข้ามแพลตฟอร์ม — สุ่มเลข N ตัวจากช่วง 1…M แบบใส่คืนหรือไม่ใส่คืนก็ได้"
description_sw = "Kichagua namba nasibu cha majukwaa mengi — huchota namba N kutoka kwenye kundi la 1…M, kwa kurudisha au bila kurudisha."
description_te = "క్రాస్-ప్లాట్‌ఫారమ్ యాదృచ్ఛిక సంఖ్యల ఎంపిక సాధనం — 1…M పరిధి నుండి N సంఖ్యలను ఎంపిక చేస్తుంది, పునఃస్థాపనతో లేదా లేకుండా."
description_ta = "பல தளங்களில் இயங்கும் சீரற்ற எண் தேர்வி — 1…M வரம்பிலிருந்து N எண்களைத் தேர்ந்தெடுக்கிறது, மாற்றீட்டுடன் அல்லது இல்லாமல்."
description_pa = "ਕਰਾਸ-ਪਲੇਟਫਾਰਮ ਰੈਂਡਮ ਨੰਬਰ ਚੋਣਕਾਰ — 1…M ਦੇ ਦਾਇਰੇ ਤੋਂ N ਨੰਬਰ ਚੁਣਦਾ ਹੈ, ਬਦਲੀ ਨਾਲ ਜਾਂ ਬਿਨਾਂ।"
description_eo = "Transplatforma hazardnombra elektilo — tiras N nombrojn el intervalo 1…M, kun aŭ sen anstataŭigo."


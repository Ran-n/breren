description_ar = "أداة اختيار أرقام عشوائية متعددة المنصات — تسحب N رقمًا من مجموعة 1…M، مع الإرجاع أو بدونه."
description_hi = "क्रॉस-प्लेटफ़ॉर्म रैंडम नंबर सेलेक्टर — 1…M की सीमा से N संख्याएँ चुनता है, प्रतिस्थापन के साथ या बिना।"
description_bn = "ক্রস-প্ল্যাটফর্ম র‍্যান্ডম নম্বর সিলেক্টর — 1…M পরিসর থেকে N সংখ্যা নির্বাচন করে, প্রতিস্থাপনসহ বা ছাড়া।"
description_ur = "کراس پلیٹ فارم رینڈم نمبر سلیکٹر — 1…M کی حد سے N نمبر منتخب کرتا ہے، تبدیلی کے ساتھ یا بغیر۔"
description_fa = "انتخابگر اعداد تصادفی چندسکویی — N عدد را از بازه 1…M انتخاب می‌کند، با یا بدون جایگذاری."
description_tr = "Platformlar arası rastgele sayı seçici — 1…M aralığından N sayı çeker, iadeli veya iadesiz."
description_vi = "Trình chọn số ngẫu nhiên đa nền tảng — rút N số từ khoảng 1…M, có hoặc không hoàn lại."

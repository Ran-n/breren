description_sw = "links.toml — ongeza, ondoa, au panga upya vigae hapa. Fanya push na ukurasa utasasishwa kiotomatiki."
description_te = "links.toml — ఇక్కడ టైల్స్‌ను జోడించండి, తీసివేయండి లేదా క్రమాన్ని మార్చండి. పుష్ చేయండి, పేజీ స్వయంచాలకంగా అప్‌డేట్ అవుతుంది."
description_ta = "links.toml — இங்கே டைல்களைச் சேர்க்கவும், நீக்கவும் அல்லது மறுவரிசைப்படுத்தவும். புஷ் செய்யவும், பக்கம் தானாகவே புதுப்பிக்கப்படும்."
description_pa = "links.toml — ਇੱਥੇ ਟਾਈਲਾਂ ਸ਼ਾਮਲ ਕਰੋ, ਹਟਾਓ, ਜਾਂ ਮੁੜ-ਤਰਤੀਬ ਦਿਓ। ਪੁਸ਼ ਕਰੋ ਅਤੇ ਪੇਜ ਆਪਣੇ ਆਪ ਅੱਪਡੇਟ ਹੋ ਜਾਵੇਗਾ।"
description_eo = "links.toml — aldonu, forigu aŭ reordigu kahelojn ĉi tie. Puŝu, kaj la paĝo aŭtomate ĝisdatiĝos."

description_tr = "links.toml — kutucukları burada ekleyin, kaldırın veya yeniden sıralayın. Push edin, sayfa otomatik olarak güncellenir."
description_vi = "links.toml — thêm, xóa hoặc sắp xếp lại các ô tại đây. Push lên và trang sẽ tự động cập nhật."
